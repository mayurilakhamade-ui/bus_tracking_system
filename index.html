<!DOCTYPE html>
<html>
<head>
    <title>Bus Tracking System - Login</title>
</head>
<body>
    <h2>Bus Tracking System</h2>

    <form onsubmit="return login()">
        <input type="text" id="username" placeholder="Enter Username" required><br><br>
        <input type="password" id="password" placeholder="Enter Password" required><br><br>
        <button type="submit">Login</button>
    </form>

<script>
function login() {
    var user = document.getElementById("username").value;
    var pass = document.getElementById("password").value;

    if (user === "admin" && pass === "1234") {
        window.location.href = "dashboard.html";
        return false;
    } else {
        alert("Invalid Login");
        return false;
    }
}
</script>

</body>
</html>
